common_required:
  - title
  - type
  - status
  - tags
  - created
  - updated

# Optional but recognized fields (do not trigger "unknown field" warnings if added later).
# `resource` is the OKF-aligned canonical pointer to the system of record (URL / vault path / SoR id).
# See .claude/rules/vault-metadata.md "resource（任意・OKF 整合）" and
# Meta/{your-meta-project}/proposal.md (accepted 2026-06-16).
optional_known_fields:
  - resource

type_enum:
  - note
  - log
  - deliverable
  - paper
  - experiment
  - reference
  - idea
  - exploration
  - activity

status_enum:
  - draft
  - in-progress
  - completed
  - archived

work_required:
  - project
  - client

work_project_enum:
  - PROJ_A
  - PROJ_B
  - PROJ_C
  - PROJ_X  # archived example (→ Archive/Work/PROJ_X/); kept valid so archived notes' project: PROJ_X pass validation

daily_required:
  type: log

archive_required:
  - archived
  - archived_from

paper_required:
  - theme
  - arxiv_id
  - paper_authors
  - paper_date
  - paper_url

experiment_required:
  - theme
  - experiment_id
  - objective
  - hypothesis
  - reproducible

work_required_paths:
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/logs/[^/]+\.md$'
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/meetings/[^/]+\.md$'
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/deliverables/[^/]+\.md$'
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/(project|team|status)\.md$'

work_excluded_paths:
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/references/'
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/sources/'
  - '^Work/(PROJ_A|PROJ_B|PROJ_C|PROJ_X)/code/'

# --- Inbox-source 拡張 (path-based override, #34) ---
# Inbox/** 配下の raw capture file は curated と別ライフサイクル。
# vault-metadata.md の "Inbox-source 拡張" セクションを正本とする。
inbox_source_paths:
  - '^Inbox/\d{4}-\d{2}-\d{2}/.*\.md$'

inbox_type_enum:
  - capture

inbox_status_enum:
  - inbox

# Inbox-source は capture skills の出力 spec に従い、curated の required field を強制しない。
# Required common fields は title / type / status / tags / created / updated のみ。
# work_required / archive_required / paper_required / experiment_required は適用しない。
inbox_common_required:
  - title
  - type
  - status
  - tags
  - created
  - updated

# --- Structure drift (Check #8) ---
# ディレクトリ構造の drift 検査用 registry。CLAUDE.md §1 のドメイン構成と整合させる。
# これらが構造の単一の正（single source of truth）であり、Python はここを読む。

# (a) Root registry: vault root 直下に存在してよいコンテンツ dir
structure_expected_root_dirs:
  - Inbox
  - Daily
  - Work
  - Research
  - Others
  - Maps
  - Persona
  - Meta
  - Archive
  - Templates
  - docs

# (a) Root registry: 構造検査から常に除外する system dir。完全一致 or prefix 一致で照合する。
# '.obsidian*' のように末尾 '*' を付けたものは prefix 一致（.obsidian / .obsidian_desktop / .obsidian_note 等）。
structure_system_root_prefixes:
  - .git
  - .claude
  - .codex
  - .hermes
  - .claudian
  - .trash
  - .tmp
  - .uv-cache
  - .obsidian*

# (b) Required dirs exist: 物理存在を必須とする dir（rules が前提とする落とし先）
# テンプレは PROJ_A のみ雛形を同梱。新案件は work-kickoff で追加し、ここにも登録する。
structure_required_dirs:
  - Work/PROJ_A/meetings
  - Work/PROJ_A/docs
  - Work/PROJ_A/code
  - Work/PROJ_A/deliverables
  - Work/PROJ_A/logs
  - Work/PROJ_A/sources
  - Work/PROJ_A/references
  - Others/Ideas
  - Others/Activities
  - Others/Learning
  - Maps/views
  - Daily
  - Meta
  - Archive
  - Templates

# (c)/(d) scan roots: 非 md 配置・空 dir 検査の対象トップレベル（submodule は除外）
structure_scan_roots:
  - Inbox
  - Daily
  - Work
  - Others
  - Maps
  - Meta
  - Archive

# (c)/(d) submodule excludes: .gitmodules から読めない場合の fallback。実装は .gitmodules を優先する。
structure_submodule_excludes:
  - Research

# (c) Non-md placement: .md 以外で許容するファイルの判定材料
structure_nonmd_allowed:
  # この prefix 配下は何でも許容（添付実体）。日付ファーストの添付は allowed_dir_names の attachments で許容される
  allowed_path_prefixes: []
  # この名前の dir 配下は何でも許容（非 md 作業物の置き場 / 外部一次資料の生置き場）
  allowed_dir_names:
    - _assets
    - sources
    - attachments
  # 拡張子に依らず常に許容するファイル名
  allowed_filenames:
    - .gitkeep
  # 特定 root 配下でのみ許容する拡張子（例: Maps/ 配下の Obsidian Bases）
  allowed_ext_under_root:
    - ext: .base
      root: Maps
  # 場所を問わず許容する拡張子
  allowed_ext_anywhere:
    - .canvas
