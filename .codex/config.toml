# Codex CLI Project Configuration
# This file enables project-specific Codex settings

# Default model configuration
model = "gpt-5.5"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"

# Web search
web_search = "live"

# Approval policy
approval_policy = "never"

# Response style
verbosity = "medium"

# Sandbox: read-only by default (per .codex/AGENTS.md discipline).
# The core promotes to workspace-write per request when a task needs to write files.
sandbox_mode = "read-only"

# Feature toggles
[features]
skills = true

# Skills configuration - enable project skills
[[skills.config]]
enabled = true
path = ".codex/skills/context-loader/SKILL.md"

# Obsidian skills (vendored from kepano/obsidian-skills)
# Physical copies under .codex/skills/ — Codex discovers skills there (same as context-loader).
# obsidian-markdown / obsidian-bases / json-canvas have mirror copies under .claude/skills/
# for Claude Code; keep those in sync when updating upstream. defuddle is codex-side +
# hermes-side (.hermes/skills/vault-capture/defuddle/) only — no .claude/ mirror.
[[skills.config]]
enabled = true
path = ".codex/skills/obsidian-markdown/SKILL.md"

[[skills.config]]
enabled = true
path = ".codex/skills/obsidian-bases/SKILL.md"

[[skills.config]]
enabled = true
path = ".codex/skills/json-canvas/SKILL.md"

[[skills.config]]
enabled = true
path = ".codex/skills/defuddle/SKILL.md"

[windows]
sandbox = "unelevated"
